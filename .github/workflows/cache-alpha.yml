name: cache-alpha

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  actions: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Resolve pnpm store path
        id: pnpm_store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: "[cache-step] group=pnpm-store"
        id: pnpm_cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-store|${{ runner.os }}|${{ hashFiles('pnpm-lock.yaml') }}|${{ github.sha }}
          restore-keys: |
            pnpm-store|${{ runner.os }}|

      - name: "[cache] group=pnpm-store hit=${{ steps.pnpm_cache.outputs.cache-hit || 'false' }} key_fp=${{ hashFiles('pnpm-lock.yaml') }} key_hint=pnpm-lock"
        run: echo "pnpm cache marker emitted"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  cache-gate:
    runs-on: ubuntu-latest
    needs: [build-test]
    if: ${{ always() }}

    steps:
      - uses: actions/checkout@v5

      - name: Run Cache Health Gate
        id: gate
        uses: eivindsjursen-lab/gates-suite-public-beta/packages/cache-health-gate@cache-health-gate/v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          mode: warn
          no_baseline_behavior: warn
          baseline_runs: "8"
          baseline_window_days: "14"
          baseline_event_filter: push
          debug: "true"

      - name: Print outputs
        run: |
          echo "RESULT=${{ steps.gate.outputs.result }}"
          echo "CONFIDENCE=${{ steps.gate.outputs.confidence }}"
          echo "BASELINE_SAMPLES=${{ steps.gate.outputs.baseline_samples }}"
          echo "REASON_CODES=${{ steps.gate.outputs.reason_codes }}"
